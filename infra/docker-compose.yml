services:

  # ── Postgres + pgvector (Phase 0 — ACTIVE) ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: civicsetu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: civicsetu
      POSTGRES_USER: civicsetu
      POSTGRES_PASSWORD: civicsetu_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d   # runs init.sql on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicsetu -d civicsetu"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j Community (Phase 1 — INACTIVE) ────────────────────────────────────
  # Uncomment when starting Phase 1
  neo4j:
    image: neo4j:5-community
    container_name: civicsetu_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/civicsetu_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"    # Browser UI
      - "7687:7687"    # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "civicsetu_dev", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5


  # ── Arize Phoenix (Phase 0 — INACTIVE, enable when tracing needed) ───────────
  # phoenix:
  #   image: arizephoenix/phoenix:latest
  #   container_name: civicsetu_phoenix
